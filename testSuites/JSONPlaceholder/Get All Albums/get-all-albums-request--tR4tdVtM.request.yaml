id: fba39664-236d-4664-a4fa-a8e6ab661fe2
name: Get All Albums Request
request:
  url:
    raw: '{{baseUrl}}/albums'
    host:
      - '{{baseUrl}}'
    path:
      - albums
  method: get
  headers:
    - key: Accept
      value: application/json
  body:
    mode: none
events:
  - listen: test
    script:
      type: javascript
      exec:
        - pq.test('Status code is 200', function () {
        - '    pq.response.to.have.status(200);'
        - '});'
        - pq.test('Response is an array', function () {
        - '    pq.expect(pq.response.json()).to.be.an(''array'');'
        - '});'
        - pq.test('Array has 100 albums', function () {
        - '    pq.expect(pq.response.json()).to.have.lengthOf(100);'
        - '});'
      src: ''
      packages: []
type: request
