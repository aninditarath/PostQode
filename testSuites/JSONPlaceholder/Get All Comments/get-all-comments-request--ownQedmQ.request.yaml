id: 602e20df-ec42-41aa-b705-6f4cb8c40c10
name: Get All Comments Request
request:
  url:
    raw: '{{baseUrl}}/comments'
    host:
      - '{{baseUrl}}'
    path:
      - comments
  method: get
  headers:
    - key: Accept
      value: application/json
  body:
    mode: none
events:
  - listen: test
    script:
      type: javascript
      exec:
        - pq.test('Status code is 200', function () {
        - '    pq.response.to.have.status(200);'
        - '});'
        - pq.test('Response is an array', function () {
        - '    pq.expect(pq.response.json()).to.be.an(''array'');'
        - '});'
        - pq.test('Array has 500 comments', function () {
        - '    pq.expect(pq.response.json()).to.have.lengthOf(500);'
        - '});'
      src: ''
      packages: []
type: request
